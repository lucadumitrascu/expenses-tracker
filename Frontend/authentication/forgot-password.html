<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Tracker</title>
    <link rel="stylesheet" href="login-register-css.css">
</head>

<body>
    <div id="div-container" class="div-container">
        <h1 class="title">Expenses Tracker</h1>

        <form id="form-forgot-password" action="login.html" method="post">
            <h2>Forgot password</h2>

            <label for="email">Email:</label>
            <input type="email" id="input-email" name="email" placeholder="abc@gmail.com" required>

            <h4>We will send a security code to this email</h4>

            <div class="div-buttons" id="div-buttons">
                <input id="btn-submit-email" type="submit">
                <button id="btn-go-back" class="btn-go-back">Go back</button>
            </div>
        </form>
    </div>
    <script src="forgot-password.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
